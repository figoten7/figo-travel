<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台南精選住宿</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-10 px-4">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-10">台南精選住宿清單</h1>
        
        <!-- 住宿卡片容器 -->
        <div id="hotel-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 載入中提示 -->
            <div id="loading" class="col-span-full text-center text-gray-500 py-20">
                正在安全讀取資料中，請稍候...
            </div>
        </div>
    </div>

    <script>
        // 【重要】請替換成您剛剛部署的 Web App URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbyTqnll0HfTMvn0RTpsZGuezgTWRuADHBnGom8Oju-SMXa6kMGbZ-4iAcsW4iAwAlK5/exec';

        async function fetchHotels() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('hotel-grid');
                const loading = document.getElementById('loading');
                
                loading.style.display = 'none';

                data.forEach(hotel => {
                    // 檢查資料是否存在
                    if(!hotel['飯店名稱']) return;

                    const card = `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                            <h2 class="text-xl font-bold text-gray-800 mb-2">${hotel['飯店名稱']}</h2>
                            <p class="text-blue-600 font-bold mb-2">價格: ${hotel['預估房價']}</p>
                            <p class="text-gray-600 text-sm mb-3 h-12 overflow-hidden">${hotel['特色摘要']}</p>
                            <p class="text-gray-500 text-xs mb-4 bg-gray-50 p-2 rounded">💡 ${hotel['重要資訊']}</p>
                            <a href="${hotel['地圖連結 (需填入)'] || '#'}" target="_blank" 
                               class="block text-center bg-gray-900 text-white py-2 rounded-lg hover:bg-gray-700 transition duration-200">
                               查看地圖位置
                            </a>
                        </div>`;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error('讀取失敗:', error);
                document.getElementById('loading').innerText = '資料讀取失敗，請檢查 API 設定或網址。';
            }
        }

        // 頁面載入時執行
        fetchHotels();
    </script>
</body>
</html>
