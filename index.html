<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9/19 台南精選住宿</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-12">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-12">台南精選住宿</h1>
        
        <div id="app" class="grid grid-cols-1 gap-12">
            <p class="text-center text-gray-500 py-20">正在讀取精選住宿資料...</p>
        </div>
    </div>

    <script>
        // 請確保此連結是 Apps Script 部署且設定為「任何人」的版本
        const API_URL = 'https://script.google.com/macros/s/AKfycbwMwbQQOTEcoibS_GlqPge0Pnb4xYjK8JOTZPWD_peO8SDTx-R_K5961GoOa0PyQ6A-lg/exec';

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const app = document.getElementById('app');
                app.innerHTML = data.map(h => `
                    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 flex flex-col md:flex-row gap-8 items-center">
                        
                        <div class="w-full md:w-1/2 flex flex-col justify-center">
                            <h2 class="text-3xl font-bold text-gray-800 mb-4">${h['飯店名稱']}</h2>
                            <p class="text-blue-600 font-bold text-xl mb-4">價格: ${h['預估房價 (TWD)']}</p>
                            <p class="text-gray-600 text-lg mb-6 leading-relaxed">${h['特色摘要']}</p>
                            <div class="text-sm text-gray-500 bg-gray-50 p-4 rounded-xl border-l-4 border-blue-400">
                                <strong>💡 重要資訊：</strong><br>${h['重要資訊']}
                            </div>
                        </div>

                        <div class="w-full md:w-1/2 h-[400px] rounded-2xl overflow-hidden shadow-inner border border-gray-100">
                            <iframe 
                                src="${h['地圖連結']}" 
                                width="100%" 
                                height="100%" 
                                frameborder="0" 
                                style="border:0" 
                                allowfullscreen>
                            </iframe>
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('app').innerHTML = `<p class="text-center text-red-500">無法讀取資料，請確認 API 連結與權限設定。</p>`;
            });
    </script>
</body>
</html>
