<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台南精選住宿 | 頂級旅人指南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

    <header class="relative h-[40vh] flex items-center justify-center overflow-hidden shadow-2xl">
    <img src="https://images.unsplash.com/photo-1506045412240-22980146a745?auto=format&fit=crop&w=2000&q=80" 
         class="absolute inset-0 w-full h-full object-cover brightness-50">
    <div class="relative z-10 text-center px-6">
        <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tight">台南 9/19 精選住宿 TOP 10</h1>
        <p class="text-white/80 text-lg md:text-xl font-medium">在秋高氣爽的九月，感受台南最美好的住宿體驗</p>
    </div>
</header>

    <main class="max-w-6xl mx-auto px-6 py-16">
        <div id="app" class="grid grid-cols-1 gap-12">
            <div class="text-center py-20 text-slate-400">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                正在讀取您的專屬住宿清單...
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwMwbQQOTEcoibS_GlqPge0Pnb4xYjK8JOTZPWD_peO8SDTx-R_K5961GoOa0PyQ6A-lg/exec';

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const app = document.getElementById('app');
                app.innerHTML = data.map((h, index) => `
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 flex flex-col md:flex-row gap-8 items-center transition-all hover:shadow-2xl group">
                        <div class="w-full md:w-1/2">
                            <span class="bg-blue-600 text-white text-xs font-black px-4 py-1.5 rounded-full mb-4 inline-block shadow-lg">TOP ${index + 1}</span>
                            <h2 class="text-3xl font-black text-slate-800 mb-4 group-hover:text-blue-600 transition-colors">${h['飯店名稱']}</h2>
                            <p class="text-blue-600 font-bold text-xl mb-4">💰 ${h['預估房價 (TWD)']}</p>
                            <p class="text-gray-600 text-lg mb-6 leading-relaxed">${h['特色摘要']}</p>
                            
                            <div class="text-sm text-gray-500 bg-slate-50 p-4 rounded-xl border-l-4 border-blue-400 mb-6">
                                <strong>💡 旅人筆記：</strong><br>${h['重要資訊']}
                            </div>
                            
                            <a href="${h['訂房連結']}" target="_blank" 
                               class="inline-block bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all transform hover:scale-105 shadow-lg">
                                立即前往訂房 →
                            </a>
                        </div>
                        
                        <div class="w-full md:w-1/2 h-[400px] rounded-2xl overflow-hidden shadow-inner">
                            <iframe src="${h['地圖連結']}" width="100%" height="100%" frameborder="0" style="border:0" allowfullscreen></iframe>
                        </div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
