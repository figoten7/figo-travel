<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9/19 台南精選住宿</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-10">台南精選住宿</h1>
        
        <div id="app" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <p class="col-span-full text-center text-gray-500 py-20">正在讀取精選住宿清單...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwMwbQQOTEcoibS_GlqPge0Pnb4xYjK8JOTZPWD_peO8SDTx-R_K5961GoOa0PyQ6A-lg/exec';

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const app = document.getElementById('app');
                app.innerHTML = data.map(h => `
                    <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 flex flex-row gap-6 hover:shadow-xl transition-shadow items-stretch">
                        
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h2 class="text-xl font-bold text-gray-800 mb-2">${h['飯店名稱']}</h2>
                                <p class="text-blue-600 font-bold mb-2">${h['預估房價 (TWD)']}</p>
                                <p class="text-gray-600 text-sm mb-4">${h['特色摘要']}</p>
                            </div>
                            <div class="text-xs text-gray-500 bg-gray-50 p-2 rounded-lg border-l-4 border-blue-400">
                                <strong>💡 重要資訊：</strong><br>${h['重要資訊']}
                            </div>
                        </div>

                        <div class="w-32 md:w-40 flex-shrink-0 rounded-xl overflow-hidden shadow-sm border border-gray-100">
                            <iframe 
                                src="${h['地圖連結']}" 
                                width="100%" 
                                height="100%" 
                                frameborder="0" 
                                style="border:0" 
                                allowfullscreen>
                            </iframe>
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('app').innerHTML = `<p class="col-span-full text-center text-red-500">無法讀取資料，請確認 API 權限設定為「任何人」。</p>`;
            });
    </script>
</body>
</html>
